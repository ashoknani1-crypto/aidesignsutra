# AIDesignSutra — netlify.toml
# Full security headers + performance settings

[[headers]]
  for = "/*"
  [headers.values]

    # Prevent clickjacking attacks
    X-Frame-Options = "SAMEORIGIN"

    # Stop MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Enable XSS protection in older browsers
    X-XSS-Protection = "1; mode=block"

    # Control referrer info sent to other sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Control what browser features are allowed
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy — allows Google AdSense + Fonts
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagmanager.com https://www.google-analytics.com https://adservice.google.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; connect-src 'self' https://www.google-analytics.com;"

# Cache static assets for performance
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
